services:
  - type: web
    name: openclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: OPENCLAW_GATEWAY_PORT
        value: "8080"
      - key: OPENCLAW_GATEWAY_BIND
        value: lan
      - key: OPENCLAW_PERSIST_STARTUP_CONFIG
        value: "1"
      - key: OPENCLAW_GATEWAY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK
        value: "1"
      - key: OPENCLAW_STATE_DIR
        value: /data/.openclaw
      - key: OPENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: OPENCLAW_SKIP_CHANNELS
        value: "1"
      - key: OPENCLAW_SKIP_CRON
        value: "1"
      - key: OPENCLAW_SKIP_CANVAS_HOST
        value: "1"
      - key: OPENCLAW_DISABLE_BONJOUR
        value: "1"
      - key: OPENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: openclaw-data
      mountPath: /data
      sizeGB: 1
